<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>TripSplit — Split Trip Expenses Easily | VRNDAI</title>
  <meta name="title"       content="TripSplit — Split Trip Expenses Easily | VRNDAI" />
  <meta name="description" content="TripSplit makes it easy to split shared trip expenses with friends — add expenses, split equally or by exact amounts, and settle up with the fewest payments possible." />
  <meta name="author"      content="VRNDAI Technologies" />
  <meta name="robots"      content="index, follow" />

  <meta name="mobile-web-app-capable"            content="yes" />
  <meta name="apple-mobile-web-app-capable"      content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title"        content="TripSplit" />
  <meta name="theme-color"                       content="#0D9488" />
  <link rel="manifest"        href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon"            href="/icon-192.png" type="image/png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D9488; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { display: flex; min-height: 100vh; max-width: 430px; margin: 0 auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.2); background: #f9fafb; }

    #install-banner {
      display: none; position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      background: #0D9488; color: #fff; border-radius: 12px; padding: 12px 18px;
      font-size: 13px; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      align-items: center; gap: 12px; max-width: 380px; width: 90%;
    }
    #install-banner.show { display: flex; }
    #install-banner button {
      background: #fff; color: #0D9488; border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    #install-banner .dismiss { background: transparent; color: rgba(255,255,255,0.7); font-size: 18px; padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="install-banner">
    <span>📲 Install TripSplit as an app</span>
    <button id="install-btn">Install</button>
    <button class="dismiss" id="dismiss-btn">✕</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('show');
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
    document.getElementById('dismiss-btn').addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('show');
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('install-banner').classList.remove('show');
    });
  </script>
</body>
</html>
